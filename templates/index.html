<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>은빛 - 마음을 나누는 게시판</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <header>
        <h1>은빛</h1>
        <p class="subtitle">어두운 마음을 비추는 작은 이야기</p>
    </header>

    <div class="box">
        <form method="post" action="/submit">
            <input name="nickname" placeholder="닉네임" required>
            <textarea name="content" placeholder="이곳에 당신의 이야기를 적어주세요..." required></textarea>
            <button type="submit">✈️ 이야기 남기기</button>
        </form>
    </div>

    {% for post in posts %}
    <div class="post">
        <div class="post-header">
            <div style="display: flex; align-items: baseline; gap: 10px;">
                <span class="nickname">{{ post.nickname }}</span>
                <span style="font-size: 12px; color: #A0AEC0; font-weight: 400;">{{ post.time_display }}</span>
            </div>
            
            <form class="report-form" method="post" action="/report/post/{{ post.id }}">
                <input name="reason" placeholder="신고 사유" required>
                <button type="submit">🚨 신고</button>
            </form>
        </div>
        
        <p class="content">{{ post.content }}</p>

        <div class="comments">
            {% for c in post.comments %}
            <div class="comment-item">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span><b>{{ c.nickname }}</b> : {{ c.content }}</span>
                    <form class="report-form" method="post" action="/report/comment/{{ post.id }}/{{ c.id }}">
                        <input name="reason" placeholder="신고 사유" required style="width: 80px;">
                        <button type="submit">🚨</button>
                    </form>
                </div>
            </div>
            {% endfor %}

            <form class="comment-form" method="post" action="/comment/{{ post.id }}" style="display: flex; gap: 8px; margin-top: 15px;">
                <input name="nickname" placeholder="닉네임" required style="flex: 1; margin-bottom: 0;">
                <input name="content" placeholder="댓글 남기기" required style="flex: 2; margin-bottom: 0;">
                <button type="submit" style="width: auto; padding: 0 20px;">작성</button>
            </form>
        </div>
    </div>
    {% endfor %}
</div>

</body>
</html>
